# Hybrid config: warping_spade on ONNX/CUDA (TRT8 plugin incompatible with TRT10)
#                all other models on TensorRT 10 for maximum GPU speed
# Use this after running build_trt.bat
models:
  warping_spade:
    name: "WarpingSpadePyTorchModel"
    predict_type: "pt"
  motion_extractor:
    name: "MotionExtractorModel"
    predict_type: "trt"
    model_path: "./checkpoints/liveportrait_onnx/motion_extractor.trt"
  landmark:
    name: "LandmarkModel"
    predict_type: "trt"
    model_path: "./checkpoints/liveportrait_onnx/landmark.trt"
  face_analysis:
    name: "MediaPipeFaceModel"
    predict_type: "mp"
  app_feat_extractor:
    name: "AppearanceFeatureExtractorModel"
    predict_type: "trt"
    model_path: "./checkpoints/liveportrait_onnx/appearance_feature_extractor.trt"
  stitching:
    name: "StitchingModel"
    predict_type: "trt"
    model_path: "./checkpoints/liveportrait_onnx/stitching.trt"
  stitching_eye_retarget:
    name: "StitchingModel"
    predict_type: "trt"
    model_path: "./checkpoints/liveportrait_onnx/stitching_eye.trt"
  stitching_lip_retarget:
    name: "StitchingModel"
    predict_type: "trt"
    model_path: "./checkpoints/liveportrait_onnx/stitching_lip.trt"

animal_models:
  warping_spade:
    name: "WarpingSpadeModel"
    predict_type: "ort"
    model_path: "./checkpoints/liveportrait_animal_onnx/warping_spade-fix-v1.1.onnx"
  motion_extractor:
    name: "MotionExtractorModel"
    predict_type: "ort"
    model_path: "./checkpoints/liveportrait_animal_onnx/motion_extractor-v1.1.onnx"
  app_feat_extractor:
    name: "AppearanceFeatureExtractorModel"
    predict_type: "ort"
    model_path: "./checkpoints/liveportrait_animal_onnx/appearance_feature_extractor-v1.1.onnx"
  stitching:
    name: "StitchingModel"
    predict_type: "ort"
    model_path: "./checkpoints/liveportrait_animal_onnx/stitching-v1.1.onnx"
  stitching_eye_retarget:
    name: "StitchingModel"
    predict_type: "ort"
    model_path: "./checkpoints/liveportrait_animal_onnx/stitching_eye-v1.1.onnx"
  stitching_lip_retarget:
    name: "StitchingModel"
    predict_type: "ort"
    model_path: "./checkpoints/liveportrait_animal_onnx/stitching_lip-v1.1.onnx"
  landmark:
    name: "LandmarkModel"
    predict_type: "trt"
    model_path: "./checkpoints/liveportrait_onnx/landmark.trt"
  face_analysis:
    name: "MediaPipeFaceModel"
    predict_type: "mp"

joyvasa_models:
  motion_model_path: "checkpoints/JoyVASA/motion_generator/motion_generator_hubert_chinese.pt"
  audio_model_path: "checkpoints/chinese-hubert-base"
  motion_template_path: "checkpoints/JoyVASA/motion_template/motion_template.pkl"

crop_params:
  src_dsize: 512
  src_scale: 2.3
  src_vx_ratio: 0.0
  src_vy_ratio: -0.125
  dri_scale: 2.2
  dri_vx_ratio: 0.0
  dri_vy_ratio: -0.1


infer_params:
  flag_crop_driving_video: False
  flag_normalize_lip: True
  flag_source_video_eye_retargeting: False
  flag_video_editing_head_rotation: False
  flag_eye_retargeting: False
  flag_lip_retargeting: False
  flag_stitching: True
  flag_relative_motion: True
  flag_pasteback: True
  flag_do_crop: True
  flag_do_rot: True
  animation_region: "all"

  # NOT EXPORTED PARAMS
  lip_normalize_threshold: 0.03
  source_video_eye_retargeting_threshold: 0.18
  driving_smooth_observation_variance: 1e-7
  anchor_frame: 0  # TO IMPLEMENT
  mask_crop_path: "./assets/mask_template.png"
  driving_multiplier: 1.0

  cfg_mode: "incremental"
  cfg_scale: 1.2

  source_max_dim: 1280
  source_division: 2
